# Charms defintion file. 

# cmd:       command to determine workload version, which is run either 
#            on the sandbox with the snap installed on it, or on the
#            running container.
#
# regex:     If the output of `cmd` needs to be parsed, a regex in which
#            the version is captured by the first match group.
#
# code_path: list of places in the charm code to look for definition of snap
#            revision. "default" is the value to use for the charms which
#            use refresh v3 charmlib.
#            - example: "constants::SNAP_REV" refers to SNAP_REV variable
#                       defined in the constants module 
#
# yaml_path: yq-style path to image URL in metadata.yaml or charmcraft.yaml
#            only reuired for k8s charms.
#

machine:
- name: kafka
  repo: https://github.com/canonical/kafka-operator
  snap: charmed-kafka
  code_path: [ "literals::CHARMED_KAFKA_SNAP_REVISION" ]
  cmd: charmed-kafka.topics --version
  regex: null
- name: kafka-connect
  repo: https://github.com/canonical/kafka-connect-operator
  snap: charmed-kafka
  code_path: [ "literals::CHARMED_KAFKA_SNAP_REVISION" ]
  cmd: charmed-kafka.topics --version
  regex: null
- name: karapace
  repo: https://github.com/canonical/karapace-operator
  snap: charmed-karapace
  code_path: [ "literals::CHARMED_KARAPACE_SNAP_REVISION" ]
  cmd: /snap/charmed-karapace/current/bin/python3 -c 'from karapace import version; print(version.version)'
  regex: null
- name: zookeeper
  repo: https://github.com/canonical/zookeeper-operator
  snap: charmed-zookeeper
  code_path: [ "literals::CHARMED_ZOOKEEPER_SNAP_REVISION" ]
  regex: version ([^\s]+)
  cmd: /snap/zookeeper/current/bin/zkServer.sh version
- name: kafka-ui
  repo: https://github.com/canonical/kafka-ui-operator
  snap: charmed-kafka-ui
  code_path: [ "literals::SNAP_REVISION" ]
  cmd: ls -1 /snap/charmed-kafka-ui/current/opt/kafka-ui/libs
  regex: api-([0-9]+\.[0-9]+\.[0-9]+)\.jar
- name: cassandra
  repo: https://github.com/canonical/cassandra-operator
  snap: charmed-cassandra
  code_path: [ "workload::SNAP_REVISION" ]
  cmd: unknown
- name: postgresql
  repo: https://github.com/canonical/postgresql-operator
  snap: charmed-postgresql
  code_path: [ "default", "constants::SNAP_PACKAGES[0][1]['revision']['x86_64']" ]
  cmd: charmed-postgresql.psql --version
  regex: "[0-9]+.[0-9]+"
  healthy: false


k8s:
- name: kafka-k8s
  cmd: /opt/kafka/bin/kafka-topics.sh --version
  yaml_path: .resources."kafka-image"."upstream-source"
  regex: null
  repo: https://github.com/canonical/kafka-k8s-operator
- name: kafka-connect-k8s
  cmd: /opt/kafka/bin/kafka-topics.sh --version
  yaml_path: .resources."kafka-image"."upstream-source"
  regex: null
  repo: https://github.com/canonical/kafka-connect-k8s-operator
- name: kafka-ui-k8s
  cmd: ls -1 /opt/kafka-ui/libs/
  yaml_path: .resources."kafka-ui-image"."upstream-source"
  regex: api-([0-9]+\.[0-9]+\.[0-9]+)\.jar
  repo: https://github.com/canonical/kafka-ui-k8s-operator
- name: karapace-k8s
  cmd: python3 -c 'from karapace import version; print(version.version)'
  yaml_path: .resources."karapace-image"."upstream-source"
  regex: null
  repo: https://github.com/canonical/karapace-k8s-operator
- name: zookeeper-k8s
  yaml_path: .resources."zookeeper-image"."upstream-source"
  regex: version ([^\s]+)
  cmd: /opt/zookeeper/bin/zkServer.sh version
  repo: https://github.com/canonical/zookeeper-k8s-operator
  healthy: false
- name: postgresql-k8s
  repo: https://github.com/canonical/postgresql-k8s-operator
  yaml_path: .resources."postgresql-image"."upstream-source"
  cmd: psql --version
  regex: "[0-9]+.[0-9]+"
  healthy: false

