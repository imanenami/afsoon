name: CI Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:


jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install tox & poetry
        run: |
          cp .env.sample .env
          sudo snap install --classic astral-uv
          pipx install tox
          pipx install poetry
      - name: Run linters
        run: tox run -e lint

  tests:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install tox & poetry
        run: |
          cp .env.sample .env
          sudo snap install --classic astral-uv
          pipx install tox
          pipx install poetry
      - name: Run tests
        run: tox run -e tests

