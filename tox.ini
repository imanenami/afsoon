[tox]
env_list = lint, main

[vars]
src_path = {tox_root}/src
all_path = main.py {[vars]src_path} 

[testenv]
set_env =
    PY_COLORS = 1
    PYTHONPATH = src/
allowlist_externals =
    uv
    uvx

[testenv:format]
description = Apply coding style standards to code
commands =
    uvx ruff check  --config pyproject.toml --fix {[vars]all_path}
    uvx ruff format --config pyproject.toml {[vars]all_path}


[testenv:lint]
description = Check code against coding style standards
commands =
    uvx codespell --toml {tox_root}/pyproject.toml {[vars]all_path}
    uvx ruff check --config {tox_root}/pyproject.toml {[vars]all_path}
    uvx ruff format --check --config {tox_root}/pyproject.toml --diff {[vars]all_path}
    uv run pyright {[vars]all_path}


[testenv:main]
commands =
    uv run main.py {posargs}
